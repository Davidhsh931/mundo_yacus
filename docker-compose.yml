services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.2G  # Suficiente para PHP 8.2 y scripts de IA moderados
          cpus: '1.0'
    volumes:
      - .:/var/www
      - /var/www/node_modules
    depends_on:
      - db

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_vite
    working_dir: /var/www
    deploy:
      resources:
        limits:
          memory: 800M   # Suficiente para el hot-reload de Vue
          cpus: '0.5'
    volumes:
      - .:/var/www
      - /var/www/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: mundo_yacus_web
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mundo_yacus_db
    deploy:
      resources:
        limits:
          memory: 800M   # MySQL 8 corre bien aquí para desarrollo local
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mundo_yacus
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: