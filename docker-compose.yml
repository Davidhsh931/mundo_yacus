services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    depends_on:
      - db

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_vite
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    # Añadimos 0.0.0.0 para que Docker no lo bloquee internamente
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: mundo_yacus_web
    ports:
      - "8000:80" # Tu celular entrará por aquí: http://192.168.43.22:8000
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mundo_yacus_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mundo_yacus
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: