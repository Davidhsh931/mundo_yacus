services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    depends_on:
      - db

  # ESTE ES EL NUEVO SERVICIO PARA VITE
  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundo_yacus_vite
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: mundo_yacus_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mundo_yacus_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mundo_yacus
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: