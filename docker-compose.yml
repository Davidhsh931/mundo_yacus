
services:
  app:
    build: .
    container_name: mundo-yacus-app
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    ports:
      - "8000:8000"   # opcional para php artisan serve
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mundo_yacus
      DB_USERNAME: root
      DB_PASSWORD: root

  db:
    image: mysql:8
    container_name: mundo-yacus-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mundo_yacus
    ports:
      - "3306:3306"